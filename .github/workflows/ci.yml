name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build engine-core
        run: npm exec nx build @org/engine-core

      - name: Run tests
        run: npm exec nx run-many -t test --projects=@org/engine-core,@org/cli

      - name: Typecheck CLI
        run: cd apps/cli && npx tsc --noEmit
